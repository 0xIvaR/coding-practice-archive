<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="index.php" method="post" enctype="multipart/form-data">
        <label for="Username">Username:</label>
        <input type="text" id="Username" placeholder="Its_ivar" minlength="6" maxlength ="15" required> <br>

        <label for="password">Password:</label>
        <input type="password" id="password" minlength="5" maxlength="12" > <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="user@example.com"><br>

        <label for="phone">Phone no:</label>
        <input type="tel" id="phone" pattern="[0-9]{10}"> <br>

        <label for="bday">Birth date:</label>
        <input type="date" id="bday"><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="2" max="25"><br>

        <label for="title">Title:</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="title">
        <label for="Phd.">Phd.</label>
        <input type="radio" id="Phd." value="Phd." name="title"><br>

        <label for="payment">Payment:</label>
        <select name="payment" id="payment">
            <option value="visa">Visa</option>
            <option value="card">Card</option>
            <option value="cash">Cash</option>
        </select><br>

        <label for="subscribe">subscribe</label>
        <input type="checkbox" id="subscribe"><br>

        <label for="comment">comment</label>
        <textarea name="comment" id="comment" rows="3" cols="25"></textarea>

        <label for="file">file</label>
        <input type="file" id="file" accept="image/png, image/jpeg"><br>
        
        <input type="reset"><br>
        <input type="submit">

    </form>
</body>
</html>
