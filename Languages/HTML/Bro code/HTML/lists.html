<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
</head>
<body>
    <!-- Lists -->
    <!-- Unordered List -->
    <h4>Groceries</h4>
    <ul>
        <li>Fruits
            <ul>
                <li>Apples</li>
                <li>Oranges</li>
                <li>Bananas
                    <ul>
                        <li>For health</li>
                        <li>For sweetness</li>
                    </ul>
                </li>
            </ul>
        </li>
    </ul>

    <!-- Ordered List -->
    <h4>To Do List</h4>
    <ol>
        <li>Eat Breakfast</li>
        <li>Go to Work</li>
        <li>Workout</li>
        <li>Go Home</li>
    </ol>

    <!-- Description List -->
    <h4>Description List</h4>
    <dl style="background-color: rgb(178, 153, 153); border: 2px solid black;">
        <dt>Name</dt>
        <dd>Soham</dd>
        <dt>Age</dt>
        <dd>20</dd>
        <dt>Email</dt>
        <dd>soham@gmail.com</dd>
    </dl>
</body>
</html>
