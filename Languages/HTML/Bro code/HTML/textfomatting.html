<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text formatting</title>
</head>
<body>
    <p>This is a normal text</p>
    <p>This is a <b>BOLD</b> text</p>
    <p>This is a <i>ITALIC</i> text</p>
    <p>This is a <u>UNDERLINE</u> text</p>
    <p>This is a <s>STRIKETHROUGH</s> text</p>
    <p>This is a <del>normal</del> text</p>
    <p>This is a <big>BIG</big> text</p>
    <p>This is a <small>SMALL</small> text</p>
    <p>This is a <mark class="highlight">MARKED</mark> text</p>
    <p>This is a <sub>SUB</sub> text</p>
    <p>This is a <sup>SUP</sup> text</p>
    <p>This is a <tt>typewritter</tt> text</p>
</body>
</html>
